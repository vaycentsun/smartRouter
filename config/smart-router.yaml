# Smart Router Configuration v1.0
# Created: 2026-04-19 12:29:30
# Description: 初始版本 - 11个模型，5种任务类型，智能路由策略
# 
# 配置概览:
# - Moonshot Kimi (api.moonshot.ai/v1) - sk-REDACTED
# - MiniMax M2.7 Highspeed (api.minimax.chat/v1) - sk-cp-REDACTED
# - 其他模型使用环境变量配置
#

# Smart Router 默认配置
# 复制此文件到工作目录，按需修改

server:
  port: 4000
  host: "127.0.0.1"
  master_key: "sk-smart-router-local"

model_list:
  # ============================================================
  # OpenAI (默认 api_base: https://api.openai.com/v1)
  # ============================================================
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
      # api_base: https://api.openai.com/v1  # 默认，可省略

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      # api_base: https://api.openai.com/v1  # 默认，可省略

  # ============================================================
  # Anthropic Claude (默认 api_base: https://api.anthropic.com)
  # ============================================================
  - model_name: claude-3-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY
      # api_base: https://api.anthropic.com  # 默认，可省略

  - model_name: claude-3-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY
      # api_base: https://api.anthropic.com  # 默认，可省略

  # ============================================================
  # DeepSeek (默认 api_base: https://api.deepseek.com)
  # ============================================================
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
      # api_base: https://api.deepseek.com/v1  # 默认，可省略

  - model_name: deepseek-r1
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY
      # api_base: https://api.deepseek.com/v1  # 默认，可省略

  # ============================================================
  # 阿里 Qwen (默认 api_base: https://dashscope.aliyuncs.com/compatible-mode/v1)
  # ============================================================
  - model_name: qwen-turbo
    litellm_params:
      model: dashscope/qwen-turbo
      api_key: os.environ/DASHSCOPE_API_KEY
      # api_base: https://dashscope.aliyuncs.com/compatible-mode/v1  # 默认，可省略

  - model_name: qwen-max
    litellm_params:
      model: dashscope/qwen-max
      api_key: os.environ/DASHSCOPE_API_KEY
      # api_base: https://dashscope.aliyuncs.com/compatible-mode/v1  # 默认，可省略

  # ============================================================
  # Moonshot Kimi (配置为 api.moonshot.ai 国际域名)
  # ============================================================
  - model_name: kimi-k2
    litellm_params:
      model: moonshot/moonshot-v1-8k
      api_base: https://api.moonshot.ai/v1
      api_key: sk-REDACTED
      # api_base: https://api.moonshot.cn/v1  # 默认，可省略

  # ============================================================
  # MiniMax (MiniMax-M2.7-Highspeed)
  # ============================================================
  - model_name: minimax-m2
    litellm_params:
      model: minimax/MiniMax-M2.7-Highspeed
      api_base: https://api.minimax.chat/v1
      api_key: sk-cp-REDACTED

  # ============================================================
  # 智谱 GLM (OpenAI-compatible 格式，必须指定 api_base)
  # ============================================================
