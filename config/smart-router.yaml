smart_router:
  default_strategy: auto

  stage_routing:
    brainstorming:
      easy: ["qwen-turbo", "gpt-4o-mini"]
      medium: ["kimi-k2", "gpt-4o"]
      hard: ["claude-3-sonnet", "qwen-max"]

    code_review:
      easy: ["gpt-4o-mini"]
      medium: ["claude-3-sonnet", "glm-5"]
      hard: ["claude-3-opus", "deepseek-chat"]

    writing:
      easy: ["qwen-turbo"]
      medium: ["gpt-4o", "kimi-k2"]
      hard: ["claude-3-sonnet"]

    reasoning:
      easy: ["gpt-4o"]
      medium: ["deepseek-chat", "kimi-k2"]
      hard: ["claude-3-opus", "deepseek-r1"]

    chat:
      easy: ["minimax-m2", "qwen-turbo"]
      medium: ["kimi-k2", "gpt-4o"]
      hard: ["claude-3-sonnet"]

  classification_rules:
    # ========== 代码审查 (最高优先级) ==========
    - pattern: '(?i)(review|审查|code.*quality|bug|lint|代码审查|cr|检查.*代码|重构|优化.*代码|看看.*代码|这段代码)'
      task_type: code_review
      difficulty: medium

    # ========== 推理/数学 ==========
    - pattern: '(?i)(prove|证明|theorem|形式化|verify|数学题|算法题|逻辑推理|证明题|计算|求解|方程|微积分|线性代数)'
      task_type: reasoning
      difficulty: hard

    # ========== 写作 (提高优先级，增加更多关键词) ==========
    - pattern: '(?i)(write|draft|撰写|compose|写.*文章|写.*邮件|写.*报告|写.*文案|写.*总结|写.*计划书|帮我写|生成.*内容|起草)'
      task_type: writing
      difficulty: medium

    # ========== 头脑风暴 ==========
    - pattern: '(?i)(brainstorm|头脑风暴|ideation|想一些|给点想法|创意|构思|方案|建议|有哪些|列举)'
      task_type: brainstorming
      difficulty: easy

    # ========== 普通问答 (最低优先级，兜底) ==========
    - pattern: '(?i)(explain|解释|什么是|how to|怎么|如何|为什么|介绍一下|说说|讲讲)'
      task_type: chat
      difficulty: easy

  embedding_match:
    enabled: true
    custom_types: []

  fallback_chain:
    gpt-4o-mini: ["gpt-4o", "kimi-k2"]
    qwen-turbo: ["kimi-k2", "minimax-m2"]
    kimi-k2: ["minimax-m2", "gpt-4o"]
    gpt-4o: ["kimi-k2", "claude-3-sonnet"]
    minimax-m2: ["kimi-k2", "qwen-turbo"]
    deepseek-chat: ["kimi-k2", "gpt-4o"]

  timeout:
    default: 30
    hard_tasks: 60

  max_fallback_retries: 2
