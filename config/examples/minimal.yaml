# 最小配置示例 - 只使用 OpenAI
server:
  port: 4000
  host: "127.0.0.1"
  master_key: "sk-smart-router-local"

model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

smart_router:
  default_strategy: auto

  stage_routing:
    chat:
      easy: ["gpt-4o-mini"]
      medium: ["gpt-4o"]
      hard: ["gpt-4o"]

  fallback_chain:
    gpt-4o-mini: ["gpt-4o"]
