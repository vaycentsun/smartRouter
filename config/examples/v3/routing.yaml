# V3 路由配置示例 - 4级难度版本
# 任务路由策略配置 - 适配多场景 AI 任务

tasks:
  # ------------------ 编程开发类 ------------------
  coding:
    name: "代码生成"
    description: "编写代码、实现功能、算法设计、Debug调试、代码重构"
    capability_weights:
      quality: 0.60    # 代码质量重要
      cost: 0.40
    keywords: ["写代码", "实现", "function", "class", "算法", "debug", "重构", "编程", "代码", "开发"]
    examples:
      - "帮我写一个快速排序算法"
      - "实现一个单例模式"
      - "这段代码怎么优化"
      - "写一个 Python 函数"
      
  code_review:
    name: "代码审查"
    description: "代码质量审查、bug发现、架构评估、性能优化建议、安全审计"
    capability_weights:
      quality: 0.70    # 审查质量至关重要
      cost: 0.30
    keywords: ["review", "审查", "代码", "code", "检查", "bug", "优化", "重构", "评估"]
    examples:
      - "review 这段代码"
      - "检查一下这个函数"
      - "找出代码里的 bug"
      - "这段代码有什么问题"
      
  # ------------------ 内容创作类 ------------------
  writing:
    name: "内容写作"
    description: "文章撰写、邮件起草、报告编写、技术文档、商业文案"
    capability_weights:
      quality: 0.60    # 内容质量优先
      cost: 0.40
    keywords: ["写", "文章", "邮件", "write", "draft", "起草", "撰写", "报告", "文档"]
    examples:
      - "帮我写一封邮件"
      - "起草一份报告"
      - "写一篇技术博客"
      - "写一份产品文档"
      
  creative:
    name: "创意写作"
    description: "故事创作、诗歌、广告创意、营销文案、剧本"
    capability_weights:
      quality: 0.65    # 创意需要高质量
      cost: 0.35
    keywords: ["故事", "诗歌", "创意", "广告", "营销", "文案", "剧本", "小说"]
    examples:
      - "写一个科幻故事"
      - "帮我写一首诗"
      - "创作一个广告文案"
      
  # ------------------ 分析推理类 ------------------
  reasoning:
    name: "逻辑推理"
    description: "数学问题、逻辑谜题、证明推导、算法分析、复杂问题求解"
    capability_weights:
      quality: 0.80    # 推理任务质量最关键
      cost: 0.20
    keywords: ["推理", "逻辑", "数学", "证明", "推导", "分析", "问题求解"]
    examples:
      - "帮我解这道数学题"
      - "分析一下这个逻辑问题"
      - "证明一下这个定理"
      
  analysis:
    name: "数据分析"
    description: "数据解读、趋势分析、商业分析、技术评估、竞争分析"
    capability_weights:
      quality: 0.60
      cost: 0.40
    keywords: ["分析", "数据", "趋势", "评估", "对比", "研究"]
    examples:
      - "分析一下这个数据集"
      - "帮我做一个竞争分析"
      - "评估一下这个技术方案"
      
  # ------------------ 学习辅助类 ------------------
  explanation:
    name: "知识讲解"
    description: "概念解释、教程编写、答疑解惑、知识梳理、学习辅导"
    capability_weights:
      quality: 0.55
      cost: 0.45
    keywords: ["解释", "什么是", "explain", "what is", "怎么理解", "原理", "教程", "概念"]
    examples:
      - "解释一下 Python 的 GIL"
      - "什么是递归"
      - "给我讲讲递归是什么"
      - "帮我理解一下这个概念"
      
  translation:
    name: "翻译"
    description: "文本翻译、本地化、多语言转换、术语校对"
    capability_weights:
      quality: 0.65    # 翻译准确性重要
      cost: 0.35
    keywords: ["翻译", "translate", "本地化", "转换", "英文", "中文", "日文"]
    examples:
      - "把这段英文翻译成中文"
      - "帮我翻译一下这篇文章"
      
  # ------------------ 通用交互类 ------------------
  chat:
    name: "日常对话"
    description: "闲聊、简单问答、日常交流、情感陪伴"
    capability_weights:
      quality: 0.35    # 对话质量要求不高
      cost: 0.65
    keywords: []
    examples: []
    
  brainstorming:
    name: "头脑风暴"
    description: "想法生成、方案讨论、创意发散、问题解决"
    capability_weights:
      quality: 0.45
      cost: 0.55
    keywords: ["想法", "方案", "创意", "头脑风暴", "讨论", "发散"]
    examples:
      - "帮我 brainstorm 一下"
      - "有什么好的想法"
      - "讨论一下这个方案"

# ==================== 难度等级定义 (4级) ====================
difficulties:
  easy:
    name: "简单"
    description: "基础问答、简单解释、短文本生成、单轮对话"
    max_tokens: 2000
    
  medium:
    name: "中等"
    description: "多轮对话、中等长度内容、标准编程任务、常规分析"
    max_tokens: 8000
    
  hard:
    name: "困难"
    description: "长文创作、复杂推理、架构设计、深度分析"
    max_tokens: 16000
    
  expert:
    name: "专家"
    description: "研究级问题、深度分析、创新设计、复杂证明"
    max_tokens: 32000

# ==================== 路由策略 ====================
strategies:
  auto:
    name: "智能自动"
    description: "根据任务类型和难度动态计算最佳模型"
    
  quality:
    name: "质量优先"
    description: "选择 capability.quality 最高的模型"
    
  cost:
    name: "成本优先"
    description: "选择 capability.cost 最高的模型（最便宜）"
    
  balanced:
    name: "平衡模式"
    description: "quality和cost权重相等(各0.5)"

# ==================== Fallback 配置 ====================
fallback:
  mode: auto
  similarity_threshold: 2    # quality差异在2以内的模型可作为fallback
  max_attempts: 3           # 最多尝试3次fallback
