# V3 模型配置示例
# 声明各模型的能力和支持的任务

models:
  gpt-4o:
    provider: openai
    litellm_model: openai/gpt-4o
    capabilities:
      quality: 9
      speed: 8
      cost: 3
      context: 128000
    supported_tasks: [chat, code_review, writing, reasoning, brainstorming]
    difficulty_support: [easy, medium, hard]
    
  gpt-4o-mini:
    provider: openai
    litellm_model: openai/gpt-4o-mini
    capabilities:
      quality: 6
      speed: 9
      cost: 9
      context: 128000
    supported_tasks: [chat, writing, brainstorming]
    difficulty_support: [easy, medium]
    
  claude-3-opus:
    provider: anthropic
    litellm_model: anthropic/claude-3-opus-20240229
    capabilities:
      quality: 10
      speed: 4
      cost: 2
      context: 200000
    supported_tasks: [code_review, writing, reasoning]
    difficulty_support: [medium, hard]
    
  claude-3-sonnet:
    provider: anthropic
    litellm_model: anthropic/claude-3-5-sonnet-20241022
    capabilities:
      quality: 8
      speed: 7
      cost: 4
      context: 200000
    supported_tasks: [chat, code_review, writing, reasoning]
    difficulty_support: [easy, medium, hard]
    
  kimi-k2:
    provider: moonshot
    litellm_model: moonshot/moonshot-v1-8k
    capabilities:
      quality: 7
      speed: 8
      cost: 7
      context: 8000
    supported_tasks: [chat, writing, brainstorming]
    difficulty_support: [easy, medium]
    
  qwen-max:
    provider: aliyun
    litellm_model: dashscope/qwen-max
    capabilities:
      quality: 8
      speed: 7
      cost: 6
      context: 32000
    supported_tasks: [chat, code_review, writing, reasoning]
    difficulty_support: [easy, medium, hard]
    
  qwen-turbo:
    provider: aliyun
    litellm_model: dashscope/qwen-turbo
    capabilities:
      quality: 6
      speed: 9
      cost: 9
      context: 8000
    supported_tasks: [chat, brainstorming]
    difficulty_support: [easy]
