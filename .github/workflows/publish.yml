name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Check package
      run: twine check dist/*
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      id-token: write
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  create-github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
        draft: false
        prerelease: false

  update-homebrew-formula:
    name: Update Homebrew Formula
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract version
      id: extract_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Wait for PyPI package availability
      run: |
        VERSION=${{ steps.extract_version.outputs.VERSION }}
        URL="https://files.pythonhosted.org/packages/source/s/smart-router/smart-router-${VERSION}.tar.gz"
        echo "Waiting for PyPI package to be available..."
        for i in {1..30}; do
          if curl -fsSL "$URL" -o /dev/null 2>/dev/null; then
            echo "PyPI package is available!"
            exit 0
          fi
          echo "Attempt $i/30: Package not available yet, waiting 10s..."
          sleep 10
        done
        echo "Timeout waiting for PyPI package"
        exit 1
    
    - name: Download sdist from PyPI and calculate SHA256
      id: calculate_sha256
      run: |
        VERSION=${{ steps.extract_version.outputs.VERSION }}
        URL="https://files.pythonhosted.org/packages/source/s/smart-router/smart-router-${VERSION}.tar.gz"
        echo "Downloading from $URL"
        curl -fsSL "$URL" -o smart-router.tar.gz
        SHA256=$(sha256sum smart-router.tar.gz | awk '{print $1}')
        echo "SHA256=$SHA256" >> $GITHUB_OUTPUT
        rm smart-router.tar.gz
    
    - name: Update Homebrew Formula
      run: |
        VERSION=${{ steps.extract_version.outputs.VERSION }}
        SHA256=${{ steps.calculate_sha256.outputs.SHA256 }}
        FORMULA="Formula/smart-router.rb"
        
        # Update url
        sed -i "s|url \".*\"|url \"https://files.pythonhosted.org/packages/source/s/smart-router/smart-router-${VERSION}.tar.gz\"|" "$FORMULA"
        
        # Update sha256
        sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "$FORMULA"
        
        echo "Updated Formula:"
        cat "$FORMULA"
    
    - name: Commit and push changes
      run: |
        VERSION=${{ steps.extract_version.outputs.VERSION }}
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/smart-router.rb
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "chore: update Homebrew Formula to v${VERSION}"
          git push origin main
        fi
