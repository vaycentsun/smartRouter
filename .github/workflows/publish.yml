name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== 前端构建 =====
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Embed frontend into Python package
        run: |
          rm -rf core/smart_router/web/static
          mkdir -p core/smart_router/web/static
          cp -r frontend/dist/* core/smart_router/web/static/

      # ===== Python 构建 =====
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v --tb=short

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      # ===== 验证 =====
      - name: Verify frontend assets in wheel
        run: |
          pip install unzip
          unzip -l dist/*.whl | grep "web/static/index.html" || (echo "❌ Frontend not found in wheel" && exit 1)
          echo "✓ Frontend assets verified in wheel"

      - name: Dashboard Smoke Test
        run: |
          pip install dist/*.whl
          smart-router dashboard &
          sleep 3
          curl -fsSL http://127.0.0.1:8080 || (echo "❌ Dashboard not accessible" && exit 1)
          echo "✓ Dashboard accessible"
          pkill -f "smart-router dashboard" || true

      # ===== 产物上传 =====
      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > ../checksums.sha256

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 5
          if-no-files-found: error

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.sha256
          retention-days: 5
          if-no-files-found: error

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*
            checksums.sha256

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      attestations: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
      - name: Extract version
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Generate release notes
        id: generate_body
        run: |
          VERSION="${{ steps.extract_version.outputs.VERSION }}"
          REPO="${{ github.repository }}"
          AUTO_NOTES=$(gh api "repos/${REPO}/releases/generate-notes" \
            -f tag_name="v${VERSION}" \
            -f target_commitish="${{ github.sha }}" \
            --jq '.body')
          cat > RELEASE_BODY.md << EOF
          ## 📦 安装方式
          ### pip
          \`\`\`bash
          pip install smartRouter==${VERSION}
          \`\`\`
          ### curl
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${REPO}/main/script/install-remote.sh | bash
          \`\`\`
          ---
          EOF
          echo "${AUTO_NOTES}" >> RELEASE_BODY.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            checksums.sha256
          body_path: RELEASE_BODY.md

  update-homebrew-formula:
    name: Update Homebrew Formula
    needs: [publish-to-pypi, create-github-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version and update formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          REPO="${{ github.repository }}"
          curl -fsSL "https://github.com/${REPO}/releases/download/v${VERSION}/checksums.sha256" -o checksums.sha256
          SHA256=$(grep "smartrouter-${VERSION}.tar.gz" checksums.sha256 | awk '{print $1}')
          sed -i "s|url \".*\"|url \"https://files.pythonhosted.org/packages/source/s/smartrouter/smartrouter-${VERSION}.tar.gz\"|" smart-router.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" smart-router.rb
      - name: Commit and push
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add smart-router.rb
          git diff --cached --quiet || git commit -m "chore: update Homebrew Formula to v${VERSION} [skip ci]"
          git push origin main
