# Models Configuration
# 模型能力声明配置

models:
  # ==================== OpenAI ====================
  gpt-4o:
    provider: openai
    litellm_model: openai/gpt-4o
    capabilities:
      quality: 9
      cost: 3
      context: 128000
    supported_tasks: [coding, code_review, writing, creative, reasoning, analysis, explanation, translation, chat, brainstorming]
    difficulty_support: [easy, medium, hard, expert]
    
  gpt-4o-mini:
    provider: openai
    litellm_model: openai/gpt-4o-mini
    capabilities:
      quality: 6
      cost: 9
      context: 128000
    supported_tasks: [writing, explanation, translation, chat, brainstorming]
    difficulty_support: [easy, medium]
    
  # ==================== Anthropic ====================
  claude-3-5-sonnet:
    provider: anthropic
    litellm_model: anthropic/claude-3-5-sonnet-20241022
    capabilities:
      quality: 9
      cost: 4
      context: 200000
    supported_tasks: [coding, code_review, writing, creative, reasoning, analysis, explanation, translation, chat, brainstorming]
    difficulty_support: [easy, medium, hard, expert]
    
  claude-3-opus:
    provider: anthropic
    litellm_model: anthropic/claude-3-opus-20240229
    capabilities:
      quality: 10
      cost: 2
      context: 200000
    supported_tasks: [code_review, writing, creative, reasoning, analysis]
    difficulty_support: [hard, expert]
    
  # ==================== Moonshot (月之暗面) ====================
  # 国内版 (api.moonshot.cn)
  kimi-k2-cn:
    provider: moonshot-cn
    litellm_model: openai/moonshot-v1-8k
    capabilities:
      quality: 7
      cost: 7
      context: 8000
    supported_tasks: [coding, writing, explanation, chat, brainstorming]
    difficulty_support: [easy, medium]
    
  kimi-k2-32k-cn:
    provider: moonshot-cn
    litellm_model: openai/moonshot-v1-32k
    capabilities:
      quality: 7
      cost: 6
      context: 32000
    supported_tasks: [coding, code_review, writing, analysis, explanation, chat, brainstorming]
    difficulty_support: [easy, medium, hard]
    
  # 国际版 (api.moonshot.ai)
  # -------------------- Kimi K2.5 多模态模型系列 --------------------
  kimi-k2.5:
    provider: moonshot-ai
    litellm_model: moonshot/kimi-k2.5
    capabilities:
      quality: 10      # 最智能模型，开源 SoTA 表现
      cost: 5
      context: 256000  # 256k 上下文
    supported_tasks: [coding, code_review, writing, creative, reasoning, analysis, explanation, translation, chat, brainstorming]
    difficulty_support: [easy, medium, hard, expert]
    
  # -------------------- Kimi K2 模型系列 --------------------
  kimi-k2-0905:
    provider: moonshot-ai
    litellm_model: moonshot/kimi-k2-0905-preview
    capabilities:
      quality: 9       # 增强 Agentic Coding 能力
      cost: 6
      context: 256000
    supported_tasks: [coding, code_review, writing, creative, reasoning, analysis, explanation, chat, brainstorming]
    difficulty_support: [easy, medium, hard, expert]
    
  kimi-k2-0711:
    provider: moonshot-ai
    litellm_model: moonshot/kimi-k2-0711-preview
    capabilities:
      quality: 9       # MoE 架构，1T 参数，32B 激活
      cost: 7
      context: 128000
    supported_tasks: [coding, code_review, writing, creative, reasoning, analysis, explanation, chat, brainstorming]
    difficulty_support: [easy, medium, hard]
    
  kimi-k2-turbo:
    provider: moonshot-ai
    litellm_model: moonshot/kimi-k2-turbo-preview
    capabilities:
      quality: 8
      cost: 8
      context: 256000
    supported_tasks: [coding, writing, explanation, chat, brainstorming]
    difficulty_support: [easy, medium]
    
  kimi-k2-thinking:
    provider: moonshot-ai
    litellm_model: moonshot/kimi-k2-thinking
    capabilities:
      quality: 10     # 长思考模型，深度推理
      cost: 5
      context: 256000
    supported_tasks: [coding, code_review, writing, creative, reasoning, analysis, explanation, chat]
    difficulty_support: [medium, hard, expert]
    
  kimi-k2-thinking-turbo:
    provider: moonshot-ai
    litellm_model: moonshot/kimi-k2-thinking-turbo
    capabilities:
      quality: 9      # 长思考高速版
      cost: 6
      context: 256000
    supported_tasks: [coding, code_review, writing, creative, reasoning, analysis, chat]
    difficulty_support: [medium, hard]
    
  # ==================== 阿里通义千问 ====================
